<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pollo Loco</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/6_salsa_bottle/salsa_bottle.png">
</head>
<body onload="init()">



    <!-- Portrait mode message (mobile only) -->
    <div id="rotate-message">
        <div class="rotate-icon">↻</div>
        <p data-i18n="rotate">Turn your device to play!</p>
    </div>

    <!-- Game wrapper -->
    <div id="wrapper">

        <!-- Canvas area -->
        <div id="canvas-container">
            <canvas id="canvas" width="720" height="480"></canvas>

            <!-- Start screen -->
            <div id="start-screen">
                <div id="start-content">
                    <div class="start-buttons">
                        <button id="start-btn" onclick="startGame(1)" data-i18n="playLevel1">Play (Level 1)</button>
                        <button id="start-btn-2" onclick="startGame(2)" style="margin-top: 10px;" data-i18n="playLevel2">Play (Level 2)</button>
                        <button id="start-btn-3" onclick="startGame(3)" style="margin-top: 10px;" data-i18n="playLevel3">Play (Level 3)</button>
                        <button id="controls-btn" onclick="openControls()" style="margin-top: 10px;" data-i18n="controlsBtn">Controls</button>
                    <div id="highscore-display" style="margin-top: 8px; color: #f5c842; font-size: 1.1rem;"></div>
                        <a href="htmls/impressum.html" class="imprint-link" style="margin-top: 10px;" data-i18n="imprint">Imprint</a>
                    </div>
                </div>
            </div>

            <!-- Controls dialog -->
            <div id="controls-dialog" class="dialog hidden" onclick="closeOnBackdrop(event, 'controls-dialog')">
                <div class="dialog-inner">
                    <button class="close-btn" onclick="closeDialog('controls-dialog')">✕</button>
                    <h2 data-i18n="controlsTitle">Controls</h2>
                    <div class="controls-list">
                        <div class="control-row">
                            <span>← →</span><span data-i18n="walk">Walk</span>
                        </div>
                        <div class="control-row">
                            <span>↑ / Leertaste</span><span data-i18n="jump">Jump</span>
                        </div>
                        <div class="control-row">
                            <span>D</span><span data-i18n="throw">Throw Bottle</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Game Over screen -->
            <div id="game-over-screen" class="hidden">
                <div class="end-content">
                    <h2 data-i18n="gameOverTitle">Game Over!</h2>
                    <button onclick="restartGame()" data-i18n="restart">Restart</button>
                    <button onclick="goHome()" data-i18n="home">Home</button>
                </div>
            </div>

            <!-- Win screen -->
            <div id="win-screen" class="hidden">
                <div class="end-content win-content">
                    <h2 data-i18n="winTitle">You won!</h2>
                    <button id="next-level-btn" onclick="nextLevel()" data-i18n="nextLevel">Next Level</button>
                    <button onclick="restartGame()" data-i18n="playAgain">Play Again</button>
                    <button onclick="goHome()" data-i18n="home">Home</button>
                </div>
            </div>

            <!-- HUD buttons -->
            <div id="language-switcher">
                <button onclick="setLanguage('en')">🇬🇧 EN</button>
                <button onclick="setLanguage('de')">🇩🇪 DE</button>
            </div>
            <button id="pause-btn" onclick="togglePause()" title="Pause">⏸</button>
            <button id="mute-btn" onclick="toggleMute()" title="Ton an/aus">🔊</button>
            <button id="fullscreen-btn" onclick="toggleFullscreen()" title="Vollbild">⛶</button>

            <!-- Mobile touch buttons (only visible on small screens) -->
            <div id="mobile-controls">
                <div class="mobile-left-group">
                    <button class="mobile-btn" id="btn-left">◀</button>
                    <button class="mobile-btn" id="btn-right">▶</button>
                </div>
                <div class="mobile-right-group">
                    <button class="mobile-btn" id="btn-throw">🍾</button>
                    <button class="mobile-btn" id="btn-jump">▲</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts – base classes first, then world, then level, then main script -->
    <script src="audio/sound-manager.js"></script>
    <script src="scripts/translations.js"></script>
    <script src="classes/keyboard.class.js"></script>
    <script src="classes/drawable-object.class.js"></script>
    <script src="classes/movable-object.class.js"></script>
    <script src="classes/background-object.class.js"></script>
    <script src="classes/cloud.class.js"></script>
    <script src="classes/coin.class.js"></script>
    <script src="classes/salsa-bottle.class.js"></script>
    <script src="classes/status-bar.class.js"></script>
    <script src="classes/level.class.js"></script>
    <script src="classes/chicken.class.js"></script>
    <script src="classes/small-chicken.class.js"></script>
    <script src="classes/throwable-object.class.js"></script>
    <script src="classes/endboss.class.js"></script>
    <script src="classes/character.class.js"></script>
    <script src="classes/world-renderer.class.js"></script>
    <script src="classes/world.class.js"></script>
    <script src="levels/level1.js"></script>
    <script src="levels/level2.js"></script>
    <script src="levels/level3.js"></script>
    <script src="script.js"></script>
</body>
</html>
